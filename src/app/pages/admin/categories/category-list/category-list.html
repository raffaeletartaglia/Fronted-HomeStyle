<div class="container mt-4">
  <div class="d-flex align-items-center mb-4 gap-4">
    <h2 class="mb-0">Gestione Categorie</h2>
    <button mat-raised-button color="primary" class="rounded-pill" style="height: 32px; line-height: 32px; font-size: 13px;" (click)="openAddDialog()">
      <mat-icon style="font-size: 18px; width: 18px; height: 18px; line-height: 18px; margin-right: 4px;">add</mat-icon> Aggiungi Categoria
    </button>
  </div>

  <div *ngIf="isLoading()" class="d-flex justify-content-center my-5">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <div class="mat-elevation-z8 table-wrapper" *ngIf="!isLoading()">
    <table class="custom-table w-100">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Descrizione</th>
          <th class="text-center">Azioni</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let element of categories" class="row-hover">
          <td>{{element.nomeCategoria}}</td>
          <td>{{element.descrizione}}</td>
          <td class="text-center">
            <div style="display: flex; flex-wrap: nowrap; justify-content: center; gap: 12px;">
              <button class="edit-btn-rounded icon-only" (click)="openEditDialog(element)" matTooltip="Modifica">
                <i class="pi pi-pencil"></i>
              </button>
              <button class="delete-btn-rounded icon-only" (click)="deleteCategory(element.id!)" matTooltip="Elimina">
                <i class="pi pi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
        
        <tr *ngIf="categories.length === 0">
          <td class="empty-state-cell" colspan="3">
            <mat-icon>category</mat-icon>
            Nessuna categoria trovata.
          </td>
        </tr>
      </tbody>
    </table>
  
    <div *ngIf="categories.length === 0" class="text-center mt-3 text-muted" style="padding: 20px;">
      Categorie non presenti.
    </div>

    <mat-paginator
                   [length]="totalElements"
                   [pageSize]="pageSize"
                   [pageSizeOptions]="[5, 10, 25, 100]"
                   [pageIndex]="pageIndex"
                   (page)="onPageChange($event)"
                   aria-label="Select page">
    </mat-paginator>
  </div>
</div>
