<h2 mat-dialog-title>{{ isEdit ? 'Modifica Prodotto' : 'Nuovo Prodotto' }}</h2>

<mat-dialog-content>
  <form [formGroup]="productForm" class="mt-2 pt-1" (ngSubmit)="onSubmit()">
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Nome Prodotto</mat-label>
        <input matInput formControlName="nomeProdotto" required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Marca</mat-label>
        <input matInput formControlName="marca" required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Categoria</mat-label>
        <mat-select formControlName="categoriaId" required>
          <mat-option *ngFor="let cat of categories" [value]="cat.id">
            {{ cat.nomeCategoria }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Prezzo (€)</mat-label>
        <input matInput type="number" formControlName="prezzo" required min="0" step="0.01">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Colore</mat-label>
        <input matInput formControlName="colore">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Modello</mat-label>
        <input matInput formControlName="modello">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Descrizione</mat-label>
        <textarea matInput formControlName="descrizione" rows="3"></textarea>
      </mat-form-field>

      <div class="full-width mb-2">
        <mat-checkbox formControlName="includeMontaggio" color="primary">Include Montaggio</mat-checkbox>
      </div>
    </div>

    <hr>
    <h4>Gestione Magazzino</h4>
    
    <div class="form-grid" style="grid-template-columns: 1fr 1fr 1fr;">
      <mat-form-field appearance="outline">
        <mat-label>Giacenza</mat-label>
        <input matInput type="number" formControlName="giacenza" min="0">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Soglia Riordino</mat-label>
        <input matInput type="number" formControlName="sogliaRiordino" min="0">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Quantità Riordino Std.</mat-label>
        <input matInput type="number" formControlName="quantitaRiordinoStandard" min="0">
      </mat-form-field>
    </div>

    <div class="form-grid pt-2">
      <mat-form-field appearance="outline">
        <mat-label>Data Pross. Disponibilità</mat-label>
        <input matInput type="date" formControlName="dataProssimaDisponibilita">
      </mat-form-field>

      <div class="file-upload-container">
        <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
        <button type="button" mat-stroked-button color="primary" (click)="fileInput.click()">
          <mat-icon>upload_file</mat-icon>
          {{ selectedImageName || 'Carica Immagine' }}
        </button>
      </div>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="dialogRef.close()">Annulla</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="productForm.invalid">Salva</button>
</mat-dialog-actions>
