<div class="product-list-container">
  <div class="header-actions">
    <h2>Gestione Prodotti</h2>
    <button mat-raised-button color="primary" (click)="openAddDialog()">
      <mat-icon>add</mat-icon> Nuovo Prodotto
    </button>
  </div>

  <div *ngIf="isLoading()" class="loading-spinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div class="mat-elevation-z8 table-wrapper" *ngIf="!isLoading()">
    <table mat-table [dataSource]="products" class="w-100">
    
    <ng-container matColumnDef="immagine">
      <th mat-header-cell *matHeaderCellDef> Immagine </th>
      <td mat-cell *matCellDef="let element">
        <div class="product-image-container">
          <img *ngIf="element.immagine" [src]="'data:image/jpeg;base64,' + element.immagine" alt="Img" class="product-thumb">
          <div *ngIf="!element.immagine" class="no-image-placeholder">N/D</div>
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="nomeProdotto">
      <th mat-header-cell *matHeaderCellDef> Nome Prodotto </th>
      <td mat-cell *matCellDef="let element"> {{element.nomeProdotto}} </td>
    </ng-container>

    <ng-container matColumnDef="marca">
      <th mat-header-cell *matHeaderCellDef> Marca </th>
      <td mat-cell *matCellDef="let element"> {{element.marca}} </td>
    </ng-container>

    <ng-container matColumnDef="categoria">
      <th mat-header-cell *matHeaderCellDef> Categoria </th>
      <td mat-cell *matCellDef="let element"> {{element.categoria?.nomeCategoria || 'N/D'}} </td>
    </ng-container>

    <ng-container matColumnDef="prezzo">
      <th mat-header-cell *matHeaderCellDef> Prezzo </th>
      <td mat-cell *matCellDef="let element"> €{{element.prezzo | number:'1.2-2'}} </td>
    </ng-container>

    <ng-container matColumnDef="giacenza">
      <th mat-header-cell *matHeaderCellDef> Giacenza </th>
      <td mat-cell *matCellDef="let element"> {{element.giacenza || 0}} </td>
    </ng-container>

    <ng-container matColumnDef="azioni">
      <th mat-header-cell *matHeaderCellDef> Azioni </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" (click)="openEditDialog(element)" style="background-color: rgba(240, 240, 245); margin-right: 8px;">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteProduct(element.id)" style="background-color: rgba(240, 240, 245);">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="goToDetail(row.id)" class="clickable-row"></tr>
  </table>

  <div *ngIf="!isLoading() && products.length === 0" class="no-data">
    Nessun prodotto trovato.
  </div>

    <mat-paginator
                   [length]="totalElements"
                   [pageSize]="pageSize"
                   [pageSizeOptions]="[5, 10, 25, 100]"
                   [pageIndex]="pageIndex"
                   (page)="onPageChange($event)"
                   aria-label="Select page">
    </mat-paginator>
  </div>
</div>
