<div class="product-list-container">
  <p-toast></p-toast>
  <div class="header-actions">
    <h2>Gestione Prodotti</h2>
    <button mat-raised-button color="primary" (click)="openAddDialog()">
      <mat-icon>add</mat-icon> Nuovo Prodotto
    </button>
  </div>

  <div *ngIf="isLoading()" class="loading-spinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div class="mat-elevation-z8 table-wrapper" *ngIf="!isLoading()">
    <table class="custom-table w-100">
      <thead>
        <tr>
          <th>Immagine</th>
          <th>Nome Prodotto</th>
          <th>Marca</th>
          <th>Categoria</th>
          <th>Prezzo</th>
          <th>Giacenza</th>
          <th class="text-center">Azioni</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let element of products" (click)="goToDetail(element.id)" class="clickable-row">
          <td>
            <div class="product-image-container">
              <img *ngIf="element.immagine" [src]="'data:image/jpeg;base64,' + element.immagine" alt="Img" class="product-thumb">
              <div *ngIf="!element.immagine" class="no-image-placeholder">N/D</div>
            </div>
          </td>
          <td>{{element.nomeProdotto}}</td>
          <td>{{element.marca}}</td>
          <td>{{element.categoria.nomeCategoria || 'N/D'}}</td>
          <td>€{{element.prezzo | number:'1.2-2'}}</td>
          <td>{{element.giacenza || 0}}</td>
          <td class="text-center" (click)="$event.stopPropagation()">
            <div style="display: flex; flex-wrap: nowrap; justify-content: center; gap: 12px;">
              <button class="edit-btn-rounded icon-only" (click)="openEditDialog(element)" matTooltip="Modifica">
                <i class="pi pi-pencil"></i>
              </button>
              <button class="delete-btn-rounded icon-only" (click)="deleteProduct(element.id)" matTooltip="Elimina">
                <i class="pi pi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
        
        <tr *ngIf="products.length === 0">
          <td class="empty-state-cell" colspan="7">
            <mat-icon>inventory_2</mat-icon>
            Nessun prodotto trovato.
          </td>
        </tr>
      </tbody>
    </table>

  <div *ngIf="!isLoading() && products.length === 0" class="no-data">
    Nessun prodotto trovato.
  </div>

    <mat-paginator
                   [length]="totalElements"
                   [pageSize]="pageSize"
                   [pageSizeOptions]="[5, 10, 25, 100]"
                   [pageIndex]="pageIndex"
                   (page)="onPageChange($event)"
                   aria-label="Select page">
    </mat-paginator>
  </div>
</div>
