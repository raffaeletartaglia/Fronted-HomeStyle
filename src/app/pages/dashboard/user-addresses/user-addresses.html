<div class="addresses-container">
  <div class="module-header">
    <div>
      <h2>I Miei Indirizzi</h2>
      <p class="subtitle">Gestisci tutti gli indirizzi associati al tuo account.</p>
    </div>
  </div>

  <div class="glass-module" *ngIf="mostraFormIndirizzo">
    <div class="form-row">
      <input type="text" class="glass-input" placeholder="Nazione" [(ngModel)]="nuovoIndirizzo.nazione">
      <input type="text" class="glass-input" placeholder="Città" [(ngModel)]="nuovoIndirizzo.citta">
      <input type="text" class="glass-input" placeholder="Provincia (es. RM)" [(ngModel)]="nuovoIndirizzo.provincia" maxlength="2" (input)="nuovoIndirizzo.provincia = nuovoIndirizzo.provincia.toUpperCase()">
    </div>
    <div class="form-row mt-3">
      <input type="text" class="glass-input" placeholder="Via" [(ngModel)]="nuovoIndirizzo.via">
      <input type="text" class="glass-input" placeholder="N° Civico" [(ngModel)]="nuovoIndirizzo.numeroCivico">
      <input type="text" class="glass-input" placeholder="CAP" [(ngModel)]="nuovoIndirizzo.cap">
    </div>
    <div class="form-row mt-3 flex-align-center">
      <select class="glass-input" [(ngModel)]="nuovoIndirizzo.tipo">
        <option value="SPEDIZIONE">Spedizione</option>
        <option value="FATTURAZIONE">Fatturazione</option>
        <option value="RESIDENZA">Residenza</option>
      </select>
      <label class="checkbox-label ml-3">
        <input type="checkbox" [(ngModel)]="nuovoIndirizzo.isDefault"> Imposta come Predefinito
      </label>
    </div>
    <div class="mt-3 text-right">
      <button class="glass-btn" style="margin-right: 10px;" (click)="mostraFormIndirizzo = false">Annulla</button>
      <button class="glass-btn primary-btn" (click)="salvaIndirizzo()">Salva Indirizzo</button>
    </div>
  </div>

  <div class="cards-grid mt-4">
    <div class="glass-card" *ngFor="let ind of indirizzoService.indirizziUtente" [ngClass]="{'default-card': ind.isDefault}">
      <!-- Ribbon predefinito -->
      <div class="default-ribbon" *ngIf="ind.isDefault">
        <span><i class="pi pi-star-fill"></i> Predefinito</span>
      </div>

      <div class="card-header">
        <div>
          <span class="badge">{{ ind.tipo }}</span>
        </div>
      </div>
      <p><strong>{{ ind.nazione }}</strong></p>
      <p>{{ ind.via }}, {{ ind.numeroCivico }}</p>
      <p>{{ ind.citta }} ({{ ind.provincia }}), {{ ind.cap }}</p>
      
      <div class="card-actions mt-3">
        <button class="glass-btn primary-btn" style="font-size: 0.85rem; padding: 4px 8px;" (click)="impostaPredefinito(ind)" *ngIf="!ind.isDefault">
          <i class="pi pi-star"></i> Imposta Predefinito
        </button>
        <span *ngIf="ind.isDefault" class="default-label"><i class="pi pi-check-circle"></i> Predefinito</span>
        <button class="glass-btn delete-btn" (click)="eliminaIndirizzo(ind.id)"><i class="pi pi-trash"></i></button>
      </div>
    </div>
  </div>

  <div class="text-right mt-4" *ngIf="!mostraFormIndirizzo">
    <button class="glass-btn primary-btn" (click)="mostraFormIndirizzo = true">
      <i class="pi pi-plus"></i> Aggiungi Indirizzo
    </button>
  </div>
</div>
