<div class="cards-container">
  <div class="module-header">
    <div>
      <h2>Le Mie Carte</h2>
      <p class="subtitle">Gestisci le tue carte di pagamento salvate.</p>
    </div>
  </div>

  <div class="glass-module" *ngIf="mostraFormCarta">
    <div class="form-row">
      <input type="text" class="glass-input full-width" placeholder="Intestatario Carta" [(ngModel)]="nuovaCarta.intestatario">
    </div>
    <div class="form-row mt-3">
      <input type="text" class="glass-input full-width" placeholder="Numero Carta (es. 4xxx o 5xxx)" [(ngModel)]="nuovaCarta.numeroCarta" maxlength="19" (input)="formattaNumeroCarta($event)">
      <div *ngIf="nuovaCarta.tipoCarta" class="flex-align-center" style="padding-left: 10px; min-width: 120px;">
        <span class="badge">{{ nuovaCarta.tipoCarta }}</span>
      </div>
    </div>
    <div class="form-row mt-3">
      <input type="text" class="glass-input" placeholder="MM/YY" [(ngModel)]="nuovaCarta.scadenza" maxlength="5" (input)="formattaScadenza($event)">
      <input type="text" class="glass-input" placeholder="CVV" [(ngModel)]="nuovaCarta.cvv" maxlength="4">
      <label class="checkbox-label ml-3 mt-2 flex-align-center" style="min-width: 200px;">
        <input type="checkbox" [(ngModel)]="nuovaCarta.isDefault"> Imposta come Predefinito
      </label>
    </div>
    <div class="mt-3 text-right">
      <button class="glass-btn" style="margin-right: 10px;" (click)="mostraFormCarta = false">Annulla</button>
      <button class="glass-btn primary-btn" (click)="salvaCarta()">Salva Carta</button>
    </div>
  </div>

  <div class="cards-grid mt-4">
    <div class="glass-card cc-card" *ngFor="let carta of cartaPagamentoService.carteUtente" [ngClass]="{'default-card': carta.isDefault}">
      <!-- Ribbon predefinita -->
      <div class="default-ribbon" *ngIf="carta.isDefault">
        <span><i class="pi pi-star-fill"></i> Predefinita</span>
      </div>

      <div class="card-header">
        <div class="card-type-badge">
          <span class="badge cc-type-badge">{{ carta.tipoCarta }}</span>
        </div>
        <div class="card-chip">&#9632;</div>
      </div>
      <div class="cc-number mt-3">
        **** **** **** {{ carta.ultime4Cifre }}
      </div>
      <div class="cc-details mt-2">
        <span>{{ carta.intestatario }}</span>
        <span>Scad. {{ carta.scadenza | slice:0:7 }}</span>
      </div>
      
      <div class="card-actions mt-3">
        <button class="glass-btn set-default-btn" (click)="impostaPredefinito(carta)" *ngIf="!carta.isDefault">
          <i class="pi pi-star"></i> Imposta Predefinita
        </button>
        <button class="glass-btn remove-default-btn" (click)="rimuoviPredefinito(carta)" *ngIf="carta.isDefault">
          <i class="pi pi-star-fill"></i> Rimuovi Predefinita
        </button>
        <button class="glass-btn delete-btn" (click)="eliminaCarta(carta.id)"><i class="pi pi-trash"></i></button>
      </div>
    </div>
  </div>

  <div class="text-right mt-4" *ngIf="!mostraFormCarta">
    <button class="glass-btn primary-btn" (click)="mostraFormCarta = true">
      <i class="pi pi-plus"></i> Aggiungi Carta
    </button>
  </div>
</div>
