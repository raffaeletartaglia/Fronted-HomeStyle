<div class="dashboard-layout" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background: transparent;">
  <div class="glass-card" style="max-width: 600px; width: 100%; text-align: center; padding: 3rem 2rem;">
    <div style="font-size: 4rem; color: #ef4444; margin-bottom: 1rem;">
      <i class="pi pi-exclamation-triangle" style="font-size: inherit;"></i>
    </div>
    
    <h1 style="font-size: 3rem; font-weight: 800; color: #333; margin-bottom: 0.5rem;">Oops!</h1>
    <h2 style="font-size: 1.5rem; color: #555; margin-bottom: 1.5rem;">Pagina Non Trovata o Accesso Negato</h2>
    
    <p style="color: #666; font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem;">
      La pagina che stai cercando non esiste oppure non hai i permessi necessari per visualizzarla. Potresti aver cliccato su un collegamento obsoleto o aver tentato di accedere a un'area riservata.
    </p>
    
    <div style="display: flex; gap: 1rem; justify-content: center;">
      <button class="btn-secondary" (click)="goBack()" style="padding: 12px 24px; border-radius: 30px; display: flex; align-items: center; gap: 8px;">
        <i class="pi pi-arrow-left"></i> Torna Indietro
      </button>
      <button class="btn-primary" (click)="goHome()" style="padding: 12px 24px; border-radius: 30px; display: flex; align-items: center; gap: 8px;">
        <i class="pi pi-home"></i> Torna alla Home
      </button>
    </div>
  </div>
</div>
